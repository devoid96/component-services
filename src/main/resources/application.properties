# ==========================================================
# INFORMACION DE LA APLICACION
# ==========================================================
spring.application.name=component-service
app.version=0.2.0
api.version=v1

# ==========================================================
# SERVIDOR WEB
# ==========================================================
server.port=8082

# ==========================================================
# BASE DE DATOS - PostgreSQL
# ==========================================================
# Local: usa localhost para IntelliJ; Docker sobrescribe con variables del compose.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/component_service}
spring.datasource.username=${DB_USERNAME:devdb}
spring.datasource.password=${DB_PASSWORD:a1b2c3d4}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================================
# POOL DE CONEXIONES - HikariCP
# ==========================================================
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ComponentHikariPool
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000

# ==========================================================
# JPA / HIBERNATE
# ==========================================================
# create-drop reinicia tablas al arrancar; Docker y local comparten este valor por defecto.
spring.jpa.hibernate.ddl-auto=${JPA_DDL:create-drop}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# SPRING ACTUATOR
# ==========================================================
# Estas propiedades quedan listas. Para activar endpoints /actuator,
# agrega la dependencia spring-boot-starter-actuator en pom.xml.
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================================
# LOGGING
# ==========================================================
logging.level.com.techplanner.componentservice=DEBUG
logging.level.com.techplanner.componentservice.config.RequestLoggingFilter=INFO
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================================
# CARGA DE ARCHIVOS
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================================
# WEB / JPA
# ==========================================================
# Evita consultas a la base de datos durante la serializacion de respuestas.
spring.jpa.open-in-view=false
