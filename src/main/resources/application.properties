# ==========================================================
# INFORMACION DE LA APLICACION
# ==========================================================
spring.application.name=component-service
app.version=0.2.0
api.version=v1

# ==========================================================
# SERVIDOR WEB
# ==========================================================
server.port=8082

# ==========================================================
# BASE DE DATOS - PostgreSQL
# ==========================================================
# Local: usa localhost:5433 porque Docker Compose expone PostgreSQL en ese puerto.
# Docker: compose.yml sobrescribe la URL con jdbc:postgresql://postgres:5432/techplanner.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/techplanner}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================================
# POOL DE CONEXIONES - HikariCP
# ==========================================================
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ComponentHikariPool
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000

# ==========================================================
# JPA / HIBERNATE
# ==========================================================
# create reinicia tablas al arrancar y carga import.sql desde cero.
# Para produccion real, usar validate o none junto con migraciones.
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================================
# SPRING ACTUATOR
# ==========================================================
# Estas propiedades quedan listas. Para activar endpoints /actuator,
# agrega la dependencia spring-boot-starter-actuator en pom.xml.
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# ==========================================================
# LOGGING
# ==========================================================
logging.level.com.techplanner.componentservice=DEBUG
logging.level.com.techplanner.componentservice.config.RequestLoggingFilter=INFO
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================================
# CARGA DE ARCHIVOS
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==========================================================
# WEB / JPA
# ==========================================================
# Evita consultas a la base de datos durante la serializacion de respuestas.
spring.jpa.open-in-view=false
